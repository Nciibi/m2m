<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="key" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield shape -->
  <path d="M128 16L48 48v64c0 50.3 31.8 96.6 80 113.3 48.2-16.7 80-63 80-113.3V48L128 16z"
        fill="url(#bg)" stroke="rgba(255,255,255,0.15)" stroke-width="2" filter="url(#glow)"/>
  <!-- Key icon -->
  <g transform="translate(80,72)" stroke="url(#key)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="48" cy="48" r="24"/>
    <line x1="64" y1="32" x2="96" y2="64"/>
    <line x1="88" y1="48" x2="96" y2="56"/>
    <line x1="72" y1="40" x2="80" y2="48"/>
  </g>
  <!-- M2M text -->
  <text x="128" y="172" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif"
        font-weight="700" font-size="28" letter-spacing="4" opacity="0.9">M2M</text>
  <!-- Accent dot -->
  <circle cx="148" cy="158" r="3" fill="#818cf8" opacity="0.8"/>
</svg>
