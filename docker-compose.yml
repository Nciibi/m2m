version: "3.9"

services:
  relay:
    build:
      context: .
      dockerfile: relay-server/Dockerfile
    ports:
      - "3478:3478"
    environment:
      - RELAY_PORT=${RELAY_PORT:-3478}
      # Set RELAY_AUTH_TOKEN to require authentication for relay registration.
      # Clients must send this token when registering.
      - RELAY_AUTH_TOKEN=${RELAY_AUTH_TOKEN:-}
    restart: unless-stopped
