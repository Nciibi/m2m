<!DOCTYPE html>

<html class="dark" lang="en"><head>

              "primary": "#c0c1ff",

              "on-background": "#e2e2ea",
              "text-muted": "#94a3b8",
              "error-container": "#93000a",
              "on-error": "#690005",
              "on-surface": "#e2e2ea",
              "danger": "#ef4444",
              "surface-container-lowest": "#0c0e14",
              "secondary-fixed-dim": "#bac5f0",
              "surface": "rgba(12, 14, 24, 0.82)",
              "on-surface-variant": "#c7c4d7",
              "on-tertiary": "#003824",
              "on-primary-fixed": "#07006c",

            },
            borderRadius: {

      }

<style>
      @keyframes breathe {
        0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); transform: scale(1); }
        50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5); transform: scale(1.02); }
      }
      .animate-breathe {
        animation: breathe 4s ease-in-out infinite;
      }
      .glass-card {
        background: rgba(12, 14, 24, 0.82);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .radial-glow {
        background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="bg-background text-on-background font-body-base flex items-center justify-center min-h-screen selection:bg-primary/30 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] radial-glow pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] radial-glow pointer-events-none"></div>
<main class="relative z-10 px-gutter w-full flex justify-center">
<!-- Unlock Vault Card -->
<div class="glass-card max-w-[380px] w-full rounded-3xl p-xl shadow-2xl shadow-black/60 flex flex-col items-center">
<!-- Icon Container -->
<div class="w-20 h-20 rounded-full flex items-center justify-center bg-white/5 border border-white/10 mb-xl animate-breathe">
<span class="material-symbols-outlined text-indigo-accent text-4xl" data-icon="lock">lock</span>
</div>
<!-- Typography Header -->
<div class="text-center mb-xl space-y-sm">
<h1 class="font-headline-2xl text-headline-2xl text-text-primary tracking-tight">Unlock Your Vault</h1>
<p class="font-body-md text-body-md text-indigo-accent/70 px-4">
                    Enter your passphrase to decrypt your local data.
                </p>
<div class="pt-sm">
<span class="font-mono-label text-label-xs bg-white/5 px-2 py-1 rounded-md text-text-muted border border-white/5">
                        Minimum 12 chars · Argon2id
                    </span>
</div>
</div>
<!-- Form -->
<form class="w-full space-y-lg" id="unlockForm">
<div class="relative">
<input class="w-full bg-input-bg border border-white/10 rounded-xl px-lg py-md font-mono-code text-body-lg text-primary placeholder:text-text-muted/30 focus:outline-none focus:ring-2 focus:ring-indigo-accent/50 focus:border-indigo-accent/50 transition-all duration-300" id="passphrase" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-text-muted hover:text-text-primary transition-colors duration-200" id="toggleVisibility" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<button class="w-full h-14 rounded-xl bg-gradient-to-tr from-indigo-deep to-indigo-accent text-white font-headline-2xl font-bold flex items-center justify-center gap-md hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-indigo-accent/20" type="submit">
                    Unlock
                </button>
</form>
<!-- Card Footer -->
<div class="mt-2xl text-center">
<div class="flex flex-col items-center gap-xs">
<span class="font-mono-code text-[10px] text-text-muted/40 tracking-widest uppercase">Vault Fingerprint</span>
<p class="font-mono-code text-label-xs text-text-muted/30">
                        a1b2c3d4-e5f6-7890-abcd-1234567890ef
                    </p>
</div>
</div>
</div>
</main>
<!-- Floating Security Decorative Tags (Minimalist) -->
<div class="fixed bottom-xl left-xl hidden md:block">
<div class="flex items-center gap-sm text-text-muted/20 font-mono-code text-label-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
<span>E2EE PROTOCOL ACTIVE</span>
</div>
</div>
<script>
        // Micro-interactions and Visibility Toggle
        const passphraseInput = document.getElementById('passphrase');
        const toggleBtn = document.getElementById('toggleVisibility');
        const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passphraseInput.type === 'password';
            passphraseInput.type = isPassword ? 'text' : 'password';
            iconSpan.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Form Submit Interaction
        const form = document.getElementById('unlockForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="ml-2">Decrypting...</span>
            `;
            
            // Simulating decryption delay
            setTimeout(() => {
                btn.innerHTML = 'Unlocked';
                btn.classList.replace('from-indigo-deep', 'from-tertiary-container');
                btn.classList.replace('to-indigo-accent', 'to-tertiary');
                // Potential redirection or state change logic would go here
            }, 1800);
        });

        // Ambient Mouse Glow (Subtle)
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Optional: subtle shine following cursor on card
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });
    </script>
</body></html>
