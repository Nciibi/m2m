<style>
        body {
            background-color: #030408;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.1), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.12), transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(99, 102, 241, 0.08), transparent 40%);
            margin: 0;
            overflow: hidden;
        }

        .glass-panel {
            background-color: rgba(12, 14, 24, 0.82);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .breathing-glow {
            animation: breathe 4s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); opacity: 0.8; }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.4); opacity: 1; }
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-glass:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex items-center justify-center font-body-lg">
<main class="w-full max-w-[400px] px-gutter relative z-10 flex flex-col items-center">
<!-- Glass Container -->
<div class="glass-panel rounded-[28px] p-stack-lg flex flex-col items-center w-full relative overflow-hidden">
<!-- Icon Container -->
<div class="w-[80px] h-[80px] rounded-full glass-panel flex items-center justify-center mb-6 breathing-glow relative bg-white/5 border-white/10">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">
                    lock
                </span>
</div>
<!-- Typography -->
<h1 class="text-[18px] font-bold text-white mb-2 text-center tracking-tight">
                Unlock Your Vault
            </h1>
<p class="text-[14px] text-indigo-300/70 mb-1 text-center max-w-[280px]">
                Enter your passphrase to decrypt your local data.
            </p>
<p class="text-[11px] font-mono-data text-white/40 mb-8 text-center uppercase tracking-widest">
                Minimum 12 chars · Argon2id
            </p>
<!-- Passphrase Input -->
<div class="w-full mb-4">
<div class="relative flex items-center w-full rounded-xl input-glass px-4 py-3">
<input class="bg-transparent border-none focus:ring-0 w-full font-mono-data text-white placeholder-white/20 text-[14px]" placeholder="••••••••••••" type="password"/>
<button class="ml-2 text-white/40 hover:text-white/60 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Unlock Button -->
<button class="w-full py-3.5 px-6 rounded-xl bg-gradient-to-r from-[#6366f1] to-[#4f46e5] text-white font-bold text-[15px] hover:opacity-90 transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
                Unlock
            </button>
<!-- Vault Fingerprint -->
<div class="mt-8">
<span class="font-mono-data text-[10px] text-white/30 uppercase tracking-[0.15em] text-center block">
                    VAULT FINGERPRINT: a1b2c3d4-e5f6-7890-abcd-1234567890ef
                </span>
</div>
</div>
</main>
<!-- Background Noise Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.012] mix-blend-overlay z-0" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
</body></html>
