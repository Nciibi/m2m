<style>
        body {
            background-color: #030408;
            overflow: hidden;
        }

        .bg-glow {
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(3, 4, 8, 0) 70%);
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .icon-glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .dot-bounce {
            animation: dot-bounce 1.4s infinite ease-in-out both;
        }

        .dot-bounce:nth-child(1) { animation-delay: -0.32s; }
        .dot-bounce:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dot-bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        .crypto-badge {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .security-pulse {
            animation: security-pulse 3s infinite;
        }

        @keyframes security-pulse {
            0%, 100% { opacity: 0.5; filter: blur(4px); }
            50% { opacity: 1; filter: blur(0px); }
        }

<body class="h-screen w-screen flex flex-col items-center justify-center relative font-body-md text-on-surface">
<!-- Atmospheric Radial Background -->
<div class="absolute inset-0 bg-glow pointer-events-none"></div>
<!-- Subtle Secondary Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="z-10 flex flex-col items-center text-center max-w-xs md:max-w-md px-container-padding-mobile">
<!-- Icon Container -->
<div class="w-20 h-20 glass-container rounded-2xl flex items-center justify-center mb-8 icon-glow">
<span aria-label="Key" class="text-3xl" role="img">🔑</span>
</div>
<!-- Typography Cluster -->
<div class="space-y-3 mb-10">
<h1 class="text-white font-headline-md text-[22px] tracking-tight leading-tight">
                Initializing Secure Enclave
            </h1>
<p class="text-on-surface-variant font-body-sm text-[13px] leading-relaxed">
                Generating Ed25519 identity keys.<br/>
                They never leave your device.
            </p>
</div>
<!-- Animated Loader -->
<div class="flex items-center gap-2 mb-16">
<div class="w-2.5 h-2.5 rounded-full bg-primary-fixed-dim dot-bounce"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary-fixed-dim dot-bounce"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary-fixed-dim dot-bounce"></div>
</div>
</main>
<!-- Footer Crypto Badge -->
<footer class="absolute bottom-12 z-10 px-container-padding-mobile">
<div class="crypto-badge py-2.5 px-6 rounded-full flex items-center gap-3">
<span class="material-symbols-outlined text-[14px] text-primary-fixed-dim security-pulse" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-crypto-code text-[11px] uppercase tracking-widest text-on-surface-variant/80">
                Ed25519 · X25519 · XChaCha20-Poly1305
            </span>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle parallax movement of the background glow on mouse move
            const glow = document.querySelector('.bg-glow');
            window.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                glow.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });

            // Simulated step transition for description text for extra detail
            const desc = document.querySelector('p');
            const steps = [
                "Generating Ed25519 identity keys.\nThey never leave your device.",
                "Performing Diffie-Hellman key exchange.\nEstablishing zero-trust tunnel.",
                "Finalizing memory-hard key derivation.\nPreparing vault..."
            ];
            let currentStep = 0;

            setInterval(() => {
                currentStep = (currentStep + 1) % steps.length;
                desc.style.opacity = 0;
                setTimeout(() => {
                    desc.innerHTML = steps[currentStep].replace('\n', '<br>');
                    desc.style.opacity = 1;
                }, 300);
            }, 4000);
            
            desc.style.transition = 'opacity 0.3s ease-in-out';
        });
    </script>
