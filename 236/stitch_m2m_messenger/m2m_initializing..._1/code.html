<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Loading Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#92002a",
                        "on-secondary": "#003919",
                        "tertiary-container": "#ff516a",
                        "surface": "#111319",
                        "primary": "#c0c1ff",
                        "secondary-fixed": "#6dfe9c",
                        "inverse-surface": "#e2e2ea",
                        "surface-container": "#1e1f26",
                        "outline": "#908fa0",
                        "secondary": "#4de082",
                        "outline-variant": "#464554",
                        "on-primary-container": "#0d0096",
                        "background": "#111319",
                        "surface-container-highest": "#33343b",
                        "on-surface-variant": "#c7c4d7",
                        "on-surface": "#e2e2ea",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-secondary-container": "#003e1c",
                        "on-primary": "#1000a9",
                        "error-container": "#93000a",
                        "surface-dim": "#111319",
                        "on-secondary-fixed": "#00210c",
                        "on-secondary-fixed-variant": "#005227",
                        "surface-bright": "#373940",
                        "on-background": "#e2e2ea",
                        "inverse-on-surface": "#2f3037",
                        "primary-fixed": "#e1e0ff",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-primary-fixed": "#07006c",
                        "surface-variant": "#33343b",
                        "surface-tint": "#c0c1ff",
                        "inverse-primary": "#494bd6",
                        "on-tertiary": "#67001b",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#5b0017",
                        "on-tertiary-fixed": "#40000d",
                        "surface-container-high": "#282a30",
                        "tertiary-fixed": "#ffdadb",
                        "primary-container": "#8083ff",
                        "surface-container-lowest": "#0c0e14",
                        "tertiary": "#ffb2b7",
                        "surface-container-low": "#1a1b21",
                        "secondary-container": "#00b55d",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#4de082"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "container-padding": "24px"
                    },
                    fontFamily: {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "mono-label": ["JetBrains Mono"],
                        "mono-data": ["JetBrains Mono"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "body-lg": ["16px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
                        "headline-md": ["24px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-sm": ["14px", { lineHeight: "1.5", letterSpacing: "0", fontWeight: "400" }],
                        "mono-label": ["13px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "500" }],
                        "mono-data": ["12px", { lineHeight: "1.4", letterSpacing: "0", fontWeight: "400" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #030408;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(99, 102, 241, 0.05), transparent 50%);
            margin: 0;
            overflow: hidden;
        }

        .glass-panel {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .key-glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
        }

        .loading-dot {
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex items-center justify-center font-body-lg">
<!-- Linear/Transactional Splash Screen (Navigation suppressed) -->
<main class="w-full max-w-md px-gutter relative z-10 flex flex-col items-center">
<!-- Glass Container -->
<div class="glass-panel rounded-xl p-stack-lg flex flex-col items-center text-center w-full relative overflow-hidden">
<!-- Subtle internal glow top -->
<div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<!-- Icon Container -->
<div class="w-[80px] h-[80px] rounded-full glass-panel flex items-center justify-center mb-stack-lg key-glow relative">
<span class="material-symbols-outlined text-primary text-[40px]" style="font-variation-settings: 'FILL' 1;">
                    key
                </span>
<!-- Inner glow ring -->
<div class="absolute inset-0 rounded-full border border-primary/20 pointer-events-none"></div>
</div>
<!-- Typography -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm tracking-tight">
                Initializing Secure Enclave
            </h1>
<p class="font-body-sm text-body-sm text-primary/70 mb-stack-lg max-w-[280px]">
                Generating Ed25519 identity keys. They never leave your device.
            </p>
<!-- Loading Indicator -->
<div class="flex space-x-unit mb-stack-lg">
<div class="w-2 h-2 rounded-full bg-primary loading-dot"></div>
<div class="w-2 h-2 rounded-full bg-primary loading-dot"></div>
<div class="w-2 h-2 rounded-full bg-primary loading-dot"></div>
</div>
<!-- Tech Stack Badge -->
<div class="glass-panel rounded-full px-4 py-2 flex items-center mt-auto border border-white/5">
<span class="font-mono-data text-mono-data text-on-surface-variant uppercase tracking-wider opacity-80">
                    Ed25519 · X25519 · XChaCha20-Poly1305
                </span>
</div>
</div>
</main>
<!-- Background Noise Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.015] mix-blend-overlay z-0" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
</body></html>
