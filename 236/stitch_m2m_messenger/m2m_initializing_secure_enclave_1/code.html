<style>
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-4px); opacity: 1; }
        }
        .dot-1 { animation: bounce-subtle 1.2s infinite ease-in-out; }
        .dot-2 { animation: bounce-subtle 1.2s infinite ease-in-out 0.2s; }
        .dot-3 { animation: bounce-subtle 1.2s infinite ease-in-out 0.4s; }

        .glass-panel {
            background: rgba(28, 30, 44, 0.4);
            backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
        }

        .glow-indigo {
            box-shadow: 0 0 20px 0 rgba(99, 102, 241, 0.12);
        }

        body {
            background-color: #030408;
            overflow: hidden;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(3, 4, 8, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-gutter">
<!-- Ambient background layer -->
<div class="ambient-glow"></div>
<main class="relative z-10 w-full max-w-[520px]">
<div class="glass-panel rounded-3xl p-3xl flex flex-col items-center text-center space-y-xl">
<!-- Icon Container -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full opacity-50 group-hover:opacity-70 transition-opacity"></div>
<div class="w-20 h-20 glass-panel rounded-2xl flex items-center justify-center glow-indigo relative z-10 border border-white/10">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-sm">
<h1 class="font-headline-3xl text-headline-3xl text-text-primary tracking-tight">
                    Initializing Secure Enclave
                </h1>
<p class="font-body-md text-body-md text-primary/70 max-w-[320px] mx-auto leading-relaxed">
                    Generating Ed25519 identity keys. They never leave your device.
                </p>
</div>
<!-- Loading Indicator -->
<div class="flex items-center justify-center space-x-xs pt-md">
<div class="w-2 h-2 rounded-full bg-primary dot-1"></div>
<div class="w-2 h-2 rounded-full bg-primary dot-2"></div>
<div class="w-2 h-2 rounded-full bg-primary dot-3"></div>
</div>
<!-- Footer Badge -->
<div class="pt-xl w-full flex justify-center">
<div class="inline-flex items-center px-lg py-sm rounded-full bg-white/5 border border-white/5 backdrop-blur-md">
<span class="font-mono-label text-label-sm text-text-muted/60 tracking-wider">
                        Ed25519 <span class="mx-xs opacity-30">·</span> X25519 <span class="mx-xs opacity-30">·</span> XChaCha20-Poly1305
                    </span>
</div>
</div>
</div>
<!-- Subtle security hint -->
<div class="mt-xl text-center opacity-40">
<div class="inline-flex items-center space-x-sm font-label-xs text-label-xs text-text-muted uppercase tracking-[0.2em]">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
<span>End-to-End Encrypted Platform</span>
</div>
</div>
</main>
<!-- Interactive micro-shimmer script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.ambient-glow');
            const x = e.clientX;
            const y = e.clientY;
            
            // Move the ambient glow slightly based on mouse position for a premium parallax feel
            const moveX = (x - window.innerWidth / 2) / 20;
            const moveY = (y - window.innerHeight / 2) / 20;
            
            glow.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        });
    </script>
</body></html>
