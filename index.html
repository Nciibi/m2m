<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="M2M - End-to-end encrypted messenger. No servers, no accounts, no tracking." />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#030408" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f1f5f9" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <title>M2M Secure Messenger</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#33343b",
              "secondary-fixed-dim": "#bac5f0",
              "tertiary-fixed": "#6ffbbe",
              "input-bg": "rgba(255, 255, 255, 0.05)",
              "on-tertiary-fixed-variant": "#005236",
              "primary-fixed": "#e1e0ff",
              "on-tertiary-fixed": "#002113",
              "surface-container-low": "#1a1b21",
              "surface-bright": "#373940",
              "error": "#ffb4ab",
              "surface-tint": "#c0c1ff",
              "primary-fixed-dim": "#c0c1ff",
              "on-surface-variant": "#c7c4d7",
              "inverse-primary": "#494bd6",
              "surface-container-lowest": "#0c0e14",
              "on-background": "#e2e2ea",
              "surface": "rgba(12, 14, 24, 0.82)",
              "surface-container": "#1e1f26",
              "secondary-container": "#3a456a",
              "on-secondary-fixed-variant": "#3a456a",
              "tertiary-fixed-dim": "#4edea3",
              "on-primary-fixed": "#07006c",
              "tertiary": "#4edea3",
              "surface-variant": "#33343b",
              "text-muted": "#94a3b8",
              "on-primary": "#1000a9",
              "border-subtle": "rgba(255, 255, 255, 0.08)",
              "tertiary-container": "#00885d",
              "inverse-surface": "#e2e2ea",
              "elevated": "rgba(28, 30, 44, 0.7)",
              "warning": "#f59e0b",
              "on-surface": "#e2e2ea",
              "danger": "#ef4444",
              "surface-dim": "#111319",
              "text-primary": "#f1f5f9",
              "on-secondary-container": "#a9b4de",
              "on-tertiary-container": "#000703",
              "on-tertiary": "#003824",
              "primary": "#c0c1ff",
              "background": "#111319",
              "on-error": "#690005",
              "secondary": "#bac5f0",
              "secondary-fixed": "#dbe1ff",
              "outline": "#908fa0",
              "on-primary-container": "#0d0096",
              "inverse-on-surface": "#2f3037",
              "on-error-container": "#ffdad6",
              "primary-container": "#8083ff",
              "surface-container-high": "#282a30",

              "error-container": "#93000a",
              "text-secondary": "#cbd5e1",

              "on-primary-fixed-variant": "#2f2ebe",
              "outline-variant": "#464554"
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            spacing: {
              "lg": "16px",
              "4xl": "64px",
              "xs": "4px",
              "xl": "24px",
              "3xl": "48px",
              "container-max": "1000px",
              "gutter": "16px",
              "md": "12px",
              "sm": "8px",
              "2xl": "32px"
            },
            fontFamily: {
              "body-xl": ["Inter"],
              "headline-4xl": ["Inter"],

              "mono-code": ["JetBrains Mono"],
              "label-xs": ["Inter"],
              "label-sm": ["Inter"]
            },
            fontSize: {
              "body-xl": ["1.05rem", {"lineHeight": "1.6", "fontWeight": "400"}],
              "headline-4xl": ["1.75rem", {"lineHeight": "1.2", "fontWeight": "700"}],
              "body-md": ["0.875rem", {"lineHeight": "1.5", "fontWeight": "400"}],
              "headline-3xl": ["1.4rem", {"lineHeight": "1.3", "fontWeight": "600"}],
              "headline-2xl": ["1.2rem", {"lineHeight": "1.4", "fontWeight": "600"}],
              "body-lg": ["0.9375rem", {"lineHeight": "1.6", "fontWeight": "400"}],
              "mono-label": ["0.75rem", {"lineHeight": "1rem", "letterSpacing": "0.02em", "fontWeight": "500"}],
              "body-base": ["0.8125rem", {"lineHeight": "1.5", "fontWeight": "400"}],
              "mono-code": ["0.8125rem", {"lineHeight": "1.5", "letterSpacing": "-0.01em", "fontWeight": "400"}],
              "label-xs": ["0.68rem", {"lineHeight": "0.875rem", "fontWeight": "500"}],
              "label-sm": ["0.75rem", {"lineHeight": "1rem", "fontWeight": "500"}]
            },
            keyframes: {
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" }
              }
            },
            animation: {
              blob: "blob 15s infinite alternate ease-in-out"
            }
          }
        }
      }
    </script>
  <body class="dark bg-background min-h-screen text-on-surface">
    
    <!-- Premium Animated Background System -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden bg-background">
      <!-- Animated Orbs -->
      <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob bg-primary/40"></div>
      <div class="absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] rounded-full mix-blend-screen filter blur-[120px] opacity-20 animate-blob animation-delay-2000 bg-tertiary/40"></div>
      <div class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob animation-delay-4000 bg-inverse-primary/40"></div>
      
      <!-- Grain Overlay -->
      <div class="absolute inset-0 opacity-[0.03] mix-blend-overlay" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
    </div>

    <div id="root" class="relative z-10 w-full h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
